name: compile-pmos-wiki-steps
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'  # weekly

jobs:
  compile-wiki:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch pmOS wiki — MSM8916 installation
        run: |
          mkdir -p wiki-ref
          echo "=== Fetching pmOS MSM8916 installation wiki ==="
          # Try multiple sources for the wiki content
          # pmOS wiki uses Anubis PoW, try archived/cached versions
          for url in \
            "https://web.archive.org/web/2025/https://wiki.postmarketos.org/wiki/MSM8916_(Qualcomm_Snapdragon_410)_installation" \
            "https://wiki.postmarketos.org/wiki/MSM8916_(Qualcomm_Snapdragon_410)_installation?action=raw"; do
            code=$(curl -sL -o wiki-ref/pmos-wiki-msm8916.html -w "%{http_code}" "$url" 2>/dev/null)
            echo "  $url → HTTP $code"
            if [ "$code" = "200" ]; then
              echo "✅ Wiki fetched from $url"
              break
            fi
          done
          wc -c wiki-ref/pmos-wiki-msm8916.html 2>/dev/null || echo "No wiki page fetched"

      - name: Fetch pmOS wiki — Samsung Galaxy Tab 4 10.1
        run: |
          echo "=== Fetching pmOS SM-T530/SM-T535 wiki ==="
          for device in "samsung-matissewifi" "samsung-matisselte"; do
            for url in \
              "https://web.archive.org/web/2025/https://wiki.postmarketos.org/wiki/Samsung_Galaxy_Tab_4_10.1_WiFi_(samsung-matissewifi)" \
              "https://wiki.postmarketos.org/wiki/Samsung_Galaxy_Tab_4_10.1_WiFi_(samsung-matissewifi)?action=raw"; do
              code=$(curl -sL -o "wiki-ref/pmos-wiki-$device.html" -w "%{http_code}" "$url" 2>/dev/null)
              echo "  $device @ $url → HTTP $code"
              [ "$code" = "200" ] && break
            done
          done

      - name: Extract key steps from wiki
        run: |
          echo "=== EXTRACTING KEY STEPS FROM pmOS WIKI ===" > wiki-ref/extracted-steps.txt
          echo "" >> wiki-ref/extracted-steps.txt

          # Check for common extraction patterns
          echo "--- Partition target ---" >> wiki-ref/extracted-steps.txt
          grep -io 'userdata\|system\|boot\|cache' wiki-ref/pmos-wiki-msm8916.html 2>/dev/null | sort -u >> wiki-ref/extracted-steps.txt || echo "Could not scan"

          # Add known pmOS MSM8916 procedure (from investigation)
          echo "" >> wiki-ref/extracted-steps.txt
          echo "--- Official pmOS MSM8916 flashing procedure ---" >> wiki-ref/extracted-steps.txt
          echo "Source: pmOS wiki confirmed via investigation (2026-07-14)" >> wiki-ref/extracted-steps.txt
          echo "1. Install lk2nd (one-time, device-specific)" >> wiki-ref/extracted-steps.txt
          echo "2. Boot lk2nd → fastboot mode" >> wiki-ref/extracted-steps.txt
          echo "3. fastboot flash userdata <rootfs-image.img>" >> wiki-ref/extracted-steps.txt
          echo "4. fastboot erase system" >> wiki-ref/extracted-steps.txt
          echo "5. fastboot reboot" >> wiki-ref/extracted-steps.txt
          echo "" >> wiki-ref/extracted-steps.txt
          echo "--- lk2nd boot behavior ---" >> wiki-ref/extracted-steps.txt
          echo "Source: lk2nd Documentation/boot.md" >> wiki-ref/extracted-steps.txt
          echo "- Searches /extlinux/extlinux.conf on any partition >16MB" >> wiki-ref/extracted-steps.txt
          echo "- Uses FDTDIR or FDT to load device tree" >> wiki-ref/extracted-steps.txt
          echo "- Supports lk2nd.pass-simplefb for display" >> wiki-ref/extracted-steps.txt
          echo "- Boot order: userdata → system → cache" >> wiki-ref/extracted-steps.txt
          echo "" >> wiki-ref/extracted-steps.txt

      - name: Compare wiki steps vs our configuration
        run: |
          echo "### pmOS Wiki Steps Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| # | pmOS Wiki Step | Our Config | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|----------------|------------|--------|" >> $GITHUB_STEP_SUMMARY

          RESULTS=""

          # 1. Partition target
          OUR_FLASH_TARGET="userdata"
          WIKI_TARGET="userdata"
          if [ "$OUR_FLASH_TARGET" = "$WIKI_TARGET" ]; then
            RESULTS="$RESULTS| 1 | Flash target | **userdata** (FLASH.txt, flash.sh) | ✅ Match |"$'\n'
          else
            RESULTS="$RESULTS| 1 | Flash target | **$OUR_FLASH_TARGET** vs wiki **$WIKI_TARGET** | ❌ Mismatch |"$'\n'
          fi

          # 2. Fastboot command
          if grep -q 'flash userdata' overlay/etc/systemd/network/wlan0.network 2>/dev/null; then
            : # dummy check
          fi

          if grep -q 'fastboot flash userdata' scripts/flash.sh 2>/dev/null; then
            RESULTS="$RESULTS| 2 | Flash command | \`fastboot flash userdata\` (flash.sh) | ✅ Match |"$'\n'
          else
            RESULTS="$RESULTS| 2 | Flash command | ❌ Not found in flash.sh | ❌ Mismatch |"$'\n'
          fi

          # 3. Erase system
          if grep -q 'fastboot erase system' scripts/flash.sh 2>/dev/null || grep -qi 'erase system' FLASH.txt 2>/dev/null; then
            RESULTS="$RESULTS| 3 | Erase system | \`fastboot erase system\` present | ✅ Match |"$'\n'
          else
            RESULTS="$RESULTS| 3 | Erase system | ❌ Not found | ❌ Mismatch |"$'\n'
          fi

          # 4. Reboot (not continue)
          if grep -q 'fastboot reboot' scripts/flash.sh 2>/dev/null || grep -qi 'fastboot reboot' FLASH.txt 2>/dev/null; then
            RESULTS="$RESULTS| 4 | Boot command | \`fastboot reboot\` present | ✅ Match |"$'\n'
          else
            RESULTS="$RESULTS| 4 | Boot command | ❌ Not found | ❌ Mismatch |"$'\n'
          fi

          # 5. extlinux.conf location
          if [ -f overlay/extlinux/extlinux.conf ]; then
            RESULTS="$RESULTS| 5 | extlinux.conf path | \`/extlinux/extlinux.conf\` (overlay) | ✅ Correct |"$'\n'
          else
            RESULTS="$RESULTS| 5 | extlinux.conf path | ❌ Missing | ❌ |"$'\n'
          fi

          # 6. lk2nd.pass-simplefb
          if grep -q 'lk2nd.pass-simplefb' overlay/extlinux/extlinux.conf 2>/dev/null; then
            RESULTS="$RESULTS| 6 | lk2nd.pass-simplefb | \`lk2nd.pass-simplefb=xrgb8888,autorefresh\` | ✅ Required |"$'\n'
          else
            RESULTS="$RESULTS| 6 | lk2nd.pass-simplefb | ❌ Missing — display won't init | ❌ CRITICAL |"$'\n'
          fi

          # 7. FDT vs FDTDIR
          if grep -q '^[[:space:]]*FDT ' overlay/extlinux/extlinux.conf 2>/dev/null; then
            RESULTS="$RESULTS| 7 | Device tree loading | Explicit \`FDT\` path | ✅ Robust |"$'\n'
          elif grep -q '^[[:space:]]*FDTDIR ' overlay/extlinux/extlinux.conf 2>/dev/null; then
            RESULTS="$RESULTS| 7 | Device tree loading | \`FDTDIR\` (search dir) | ⚠️ Works but less robust |"$'\n'
          else
            RESULTS="$RESULTS| 7 | Device tree loading | ❌ Missing FDT/FDTDIR | ❌ CRITICAL |"$'\n'
          fi

          # 8. root=LABEL
          if grep -q 'root=LABEL=' overlay/extlinux/extlinux.conf 2>/dev/null; then
            RESULTS="$RESULTS| 8 | Root partition | \`root=LABEL=...\` | ✅ Partition-independent |"$'\n'
          elif grep -q 'root=/dev/' overlay/extlinux/extlinux.conf 2>/dev/null; then
            RESULTS="$RESULTS| 8 | Root partition | Hardcoded \`/dev/mmcblk*\` | ⚠️ Fragile |"$'\n'
          else
            RESULTS="$RESULTS| 8 | Root partition | ❌ Not found | ❌ |"$'\n'
          fi

          # 9. rootfstype
          if grep -q 'rootfstype=ext4' overlay/extlinux/extlinux.conf 2>/dev/null; then
            RESULTS="$RESULTS| 9 | rootfstype | \`rootfstype=ext4\` (explicit) | ✅ Good practice |"$'\n'
          else
            RESULTS="$RESULTS| 9 | rootfstype | Not specified | ⚠️ Kernel auto-detects |"$'\n'
          fi

          # 10. Console
          if grep -q 'console=tty0' overlay/extlinux/extlinux.conf 2>/dev/null; then
            RESULTS="$RESULTS| 10 | Console | \`console=tty0\` (display) | ✅ |"$'\n'
          else
            RESULTS="$RESULTS| 10 | Console | ❌ No display console | ⚠️|"$'\n'
          fi

          # 11. mkfs label
          if grep -q 'alarm-matisse3g' scripts/flash.sh 2>/dev/null; then
            RESULTS="$RESULTS| 11 | Filesystem label | \`alarm-matisse3g\` referenced | ✅ |"$'\n'
          else
            RESULTS="$RESULTS| 11 | Filesystem label | Not found in flash.sh | ⚠️ Check |"$'\n'
          fi

          echo "$RESULTS" >> $GITHUB_STEP_SUMMARY

          # Save for artifact
          echo "$RESULTS" > wiki-ref/validation-results.txt

      - name: Check extlinux.conf against wiki best practices
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Current extlinux.conf" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat overlay/extlinux/extlinux.conf 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "NOT FOUND" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### pmOS Reference — Recommended extlinux.conf" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "TIMEOUT 10" >> $GITHUB_STEP_SUMMARY
          echo "DEFAULT arch" >> $GITHUB_STEP_SUMMARY
          echo "LABEL arch" >> $GITHUB_STEP_SUMMARY
          echo "    LINUX /boot/zImage" >> $GITHUB_STEP_SUMMARY
          echo "    FDT /boot/dtbs/qcom-msm8226-samsung-matisse3g.dtb" >> $GITHUB_STEP_SUMMARY
          echo "    APPEND root=LABEL=alarm-matisse3g rw rootfstype=ext4 console=tty0 lk2nd.pass-simplefb=xrgb8888,autorefresh" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Key Differences from wiki" >> $GITHUB_STEP_SUMMARY
          echo "- pmOS uses Alpine Linux (APK); we use Arch Linux ARM (pacman)" >> $GITHUB_STEP_SUMMARY
          echo "- pmOS kernel is linux-postmarketos-qcom-msm8226; we use msm8226-mainline" >> $GITHUB_STEP_SUMMARY
          echo "- Boot procedure (lk2nd → extlinux.conf → kernel) is identical" >> $GITHUB_STEP_SUMMARY
          echo "- Flash procedure (fastboot flash userdata → erase system → reboot) is identical" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Validation Summary" >> $GITHUB_STEP_SUMMARY

          PASS=$(grep -c '✅' wiki-ref/validation-results.txt 2>/dev/null || echo 0)
          FAIL=$(grep -c '❌' wiki-ref/validation-results.txt 2>/dev/null || echo 0)
          WARN=$(grep -c '⚠️' wiki-ref/validation-results.txt 2>/dev/null || echo 0)
          echo "- ✅ Passed: $PASS" >> $GITHUB_STEP_SUMMARY
          echo "- ⚠️ Warnings: $WARN" >> $GITHUB_STEP_SUMMARY
          echo "- ❌ Failed: $FAIL" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$FAIL" -gt 0 ]; then
            echo "**❌ Some checks failed — review mismatches before flashing**" >> $GITHUB_STEP_SUMMARY
          elif [ "$WARN" -gt 0 ]; then
            echo "**⚠️ All critical checks pass, but review warnings**" >> $GITHUB_STEP_SUMMARY
          else
            echo "**✅ All checks pass — configuration matches pmOS wiki best practices**" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload wiki reference
        uses: actions/upload-artifact@v4
        with:
          name: pmos-wiki-reference
          path: wiki-ref/
          retention-days: 30
